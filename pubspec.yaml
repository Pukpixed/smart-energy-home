name: smart_energy_home

description: Smart Home Energy Management System

publish_to: 'none'

version: 1.0.0+1


environment:
  sdk: ">=3.3.0 <4.0.0"


dependencies:

  flutter:
    sdk: flutter


  # Icons
  cupertino_icons: ^1.0.8


  # Firebase
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_messaging: ^16.4.3


  # Google Authentication
  google_sign_in: ^7.2.0


  # State Management
  provider: ^6.1.5+1


  # Navigation
  go_router: ^17.3.0


  # Charts
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^34.1.31


  # MQTT ESP32
  mqtt_client: ^10.11.1


  # Local Notification
  flutter_local_notifications: ^19.3.0


  # PDF Report
  pdf: ^3.11.3
  printing: ^5.14.2


  # Date Format
  intl: ^0.20.2


  # UI
  flutter_svg: ^2.2.0
  flutter_screenutil: ^5.9.3
  flutter_spinkit: ^5.2.2


  # Local Storage
  shared_preferences: ^2.5.3


  # Network Status
  connectivity_plus: ^7.0.0



dev_dependencies:

  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


  flutter_launcher_icons: ^0.14.4



flutter:

  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/



# App Icon Configuration
flutter_launcher_icons:

  android: true
  ios: true

  image_path: "assets/images/logo.png"

  adaptive_icon_background: "#071C24"

  adaptive_icon_foreground: "assets/images/logo.png"

  min_sdk_android: 21