name: smart_energy_home
description: Smart Home Energy Management System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.1.0

  # Google Sign In
  google_sign_in: ^7.1.1


  # State Management
  provider: ^6.1.5+1

  # Navigation
  go_router: ^17.3.0

  # Charts
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^33.2.12

  # MQTT for ESP32
  mqtt_client: ^10.11.1

  # Notifications
  flutter_local_notifications: ^22.0.0

  # Reports
  pdf: ^3.11.3
  printing: ^5.14.2

  # Utilities
  intl: ^0.20.2

  # UI
  flutter_svg: ^2.2.0
  flutter_screenutil: ^5.9.3
  flutter_spinkit: ^5.2.2

  # Storage
  shared_preferences: ^2.5.3

  # Connectivity
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#071C24"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21